; PlatformIO Project Configuration File — expanseElectronics masterETH
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp07
src_dir = src
include_dir = include
lib_dir = lib
data_dir = data

; ============================================================================
; Common settings shared across environments
; ============================================================================
[env]
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_resetmethod = nodemcu

; Vendored libraries under lib/:
;   - lib/EthernetLarge/       2.0.0  (not on registry)
;   - lib/EthernetWebServer/   2.4.0  (registry pruned 1.x and 2.4.0 too)
;
; ArduinoJson is fetched from the registry — v7's API is stable and the
; library is a single header. Same pinning rationale as dualeth-pixelcontrol.
lib_deps =
    bblanchon/ArduinoJson@^7.4.3

; ============================================================================
; ESP-07 (4MB flash) — production target for masterETH
; ============================================================================
;
; The module is a 4MB ESP-07S (esptool: "Detected flash size: 4MB"), but the
; stock `esp07` board defaults to a 1MB (1m64) layout: ~761KB sketch, 64KB FS,
; and only the leftover for OTA. The v2.2 firmware is ~547KB, so two copies
; (running + incoming) can't coexist in 1MB and OTA fails mid-write with
; "Failed to save" (Update.begin gets a sub-547KB slot, the write overruns).
;
; Fix: use the real 4MB with an OTA-capable layout — 4m1m gives a 1MB sketch
; region + 1MB LittleFS and leaves ~2MB free for the OTA copy, so the 547KB
; sketch OTAs with room to spare (and headroom for growth up to ~1MB).
; NOTE: changing the layout moves the EEPROM sector, so the first boot after
; this change reloads store.cpp defaults (settings wiped once — expected).
; masterETH doesn't use LittleFS for the SPA (PROGMEM only); the FS partition
; is reserved for future node-registry snapshots.
;
[env:esp07]
platform = espressif8266
board = esp07
board_build.filesystem = littlefs
board_upload.flash_size = 4MB
board_upload.maximum_size = 1044464
board_build.ldscript = eagle.flash.4m1m.ld
; CPU MUST run at 160 MHz. The status-LED bit-banger
; (src/ethWs2812Driver.cpp, copied verbatim from dualETH) uses hand-rolled
; Xtensa inline asm with hardcoded CCOUNT cycle deltas tuned for 160 MHz.
; Dropping to 80 MHz silently doubles every WS2812 bit time and the LED
; will not light correctly. This constraint applies even though the
; manager only drives a single status LED.
board_build.f_cpu = 160000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
build_flags =
    -D FIRMWARE_VARIANT_MASTERETH
    -D F_CPU=160000000L

; OTA upload over the network (uncomment and set IP after first serial flash):
; upload_protocol = espota
; upload_port = 10.0.0.1
